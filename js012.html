<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur de Couleurs</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; transition: 0.5s; }
        .code-couleur { background: rgba(255,255,255,0.8); padding: 10px 20px; border-radius: 10px; font-family: monospace; font-size: 1.2rem; }
        button { margin-top: 20px; padding: 12px 24px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="code-couleur" id="rgbLabel">rgb(255, 255, 255)</div>
    <button onclick="changerCouleur()">Générer une couleur</button>

    <script>
        function changerCouleur() {
            // Génération de 3 nombres entre 0 et 255
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);

            const couleurFinale = `rgb(${r}, ${g}, ${b})`;

            // On applique au fond et au texte
            document.body.style.backgroundColor = couleurFinale;
            document.getElementById('rgbLabel').innerText = couleurFinale;
        }
    </script>
</body>
</html>
