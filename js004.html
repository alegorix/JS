<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Visionneuse JS</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f4f4f4; }
        .main-img { width: 400px; height: 300px; object-fit: cover; border: 5px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.3s; }
        .thumbnails { margin-top: 20px; }
        .thumb { width: 80px; cursor: pointer; opacity: 0.6; transition: 0.3s; margin: 5px; }
        .thumb:hover { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>

    <h2>Ma Galerie Photo</h2>
    <img id="affichage" class="main-img" src="https://loremflickr.com/400/300/dog?lock=1" alt="Image principale">

    <div class="thumbnails">
        <img class="thumb" src="https://loremflickr.com/80/80/dog?lock=1" onclick="changerImage('https://loremflickr.com/400/300/dog?lock=1')">
        <img class="thumb" src="https://loremflickr.com/80/80/paris?lock=1" onclick="changerImage('https://loremflickr.com/400/300/paris?lock=1')">
        <img class="thumb" src="https://loremflickr.com/80/80/cat?lock=1" onclick="changerImage('https://loremflickr.com/400/300/cat?lock=1')">
    </div>

    <script>
        function changerImage(url) {
            const imagePrincipale = document.getElementById('affichage');
            // On change l'attribut src de la balise <img>
            imagePrincipale.src = url;
            // Petit effet de fondu
            imagePrincipale.style.opacity = 0.5;
            setTimeout(() => imagePrincipale.style.opacity = 1, 100);
        }
    </script>
</body>
</html>
